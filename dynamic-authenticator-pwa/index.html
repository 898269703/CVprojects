<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f6bff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="动态验证器" />
  <title>动态验证器</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./assets/icon.svg" />
  <style>
    :root{--blue:#0f6bff;--blue2:#31b7ff;--bg:#f6f9ff;--text:#14213d;--muted:#6c7890;--card:#fff;--line:#e7eefb;--danger:#e5484d;--ok:#19b36b;--shadow:0 18px 45px rgba(28,77,160,.13)}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:linear-gradient(180deg,#f7fbff,#eef5ff);color:var(--text)}button,input{font:inherit}button{border:0;cursor:pointer}.app{min-height:100dvh;max-width:520px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 88px)}.hidden{display:none!important}.header{display:flex;align-items:center;gap:12px;margin:6px 0 18px}.logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--blue),var(--blue2));display:grid;place-items:center;color:white;font-weight:800;box-shadow:var(--shadow)}h1{margin:0;font-size:24px}p{margin:0;color:var(--muted);font-size:13px}.top-actions{margin-left:auto;display:flex;gap:8px}.btn{border-radius:16px;padding:12px 15px;background:var(--blue);color:#fff;font-weight:700;box-shadow:0 10px 24px rgba(15,107,255,.25)}.btn.small{padding:9px 12px;border-radius:13px;font-size:13px}.btn.ghost{background:#fff;color:var(--blue);box-shadow:none;border:1px solid var(--line)}.btn.danger{background:var(--danger)}.search{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 14px;box-shadow:0 10px 25px rgba(30,80,150,.06);margin-bottom:14px}.search input{border:0;outline:0;flex:1;background:transparent}.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.lock{display:grid;place-items:center;min-height:85dvh;text-align:center}.lock .logo{width:72px;height:72px;border-radius:24px;font-size:28px;margin-bottom:18px}.pinbox{width:100%;padding:20px;margin-top:18px}.pinbox input,.modal input{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin:8px 0;outline:0;background:#fbfdff}.pinbox .btn,.modal .btn{width:100%;margin-top:10px}.note{margin-top:12px;line-height:1.6}.account-list{display:grid;gap:13px}.account{padding:16px;position:relative;overflow:hidden}.account:before{content:"";position:absolute;inset:-80px -80px auto auto;width:160px;height:160px;border-radius:999px;background:rgba(15,107,255,.08)}.account-head{display:flex;gap:11px;align-items:center}.svc{width:42px;height:42px;border-radius:15px;background:#eef5ff;display:grid;place-items:center;color:var(--blue);font-weight:900}.meta{min-width:0}.meta b{display:block;font-size:16px}.meta span{display:block;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.code-row{display:flex;align-items:center;gap:12px;margin-top:13px}.code{font-size:34px;letter-spacing:2px;color:var(--blue);font-weight:900;line-height:1}.copy{background:#eef5ff;color:var(--blue);border-radius:13px;padding:9px 11px}.ring{margin-left:auto;width:50px;height:50px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--blue) var(--p),#e6eefb 0);font-size:12px;font-weight:800;color:var(--blue);position:relative}.ring:after{content:"";position:absolute;inset:6px;border-radius:50%;background:white}.ring span{position:relative;z-index:1}.empty{padding:26px;text-align:center;margin-top:24px}.empty-icon{width:62px;height:62px;margin:0 auto 14px;border-radius:22px;background:#eef5ff;color:var(--blue);display:grid;place-items:center;font-size:30px}.tabs{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(520px,100%);padding:10px 16px calc(env(safe-area-inset-bottom) + 10px);background:rgba(255,255,255,.86);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tab{background:transparent;color:var(--muted);border-radius:15px;padding:8px 4px;font-size:12px}.tab.active{background:#eef5ff;color:var(--blue);font-weight:800}.page-title{margin:10px 0 12px;font-size:18px}.history{display:grid;gap:10px}.history-item{padding:13px 15px;display:flex;justify-content:space-between;gap:12px}.settings{display:grid;gap:12px}.setting{padding:16px;display:flex;justify-content:space-between;gap:14px}.status{color:var(--ok);font-weight:800}.modal-bg{position:fixed;inset:0;background:rgba(12,27,55,.42);backdrop-filter:blur(8px);z-index:20;display:grid;place-items:end center;padding:16px}.modal{width:min(520px,100%);background:white;border-radius:28px;padding:18px;box-shadow:0 20px 70px rgba(0,0,0,.18)}.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.x{background:#eef2f8;border-radius:12px;width:36px;height:36px}.scanbox{height:330px;background:#101828;border-radius:22px;overflow:hidden;position:relative;display:grid;place-items:center;color:white;text-align:center}.scanbox video{width:100%;height:100%;object-fit:cover}.scan-hint{position:absolute;left:20px;right:20px;bottom:20px;z-index:2;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.55)}.frame{position:absolute;width:220px;height:220px;border:2px solid rgba(255,255,255,.75);border-radius:26px;box-shadow:0 0 0 999px rgba(0,0,0,.38)}.frame:after{content:"";position:absolute;left:16px;right:16px;top:50%;height:2px;background:linear-gradient(90deg,transparent,#35b7ff,transparent);box-shadow:0 0 16px #35b7ff;animation:scan 1.8s linear infinite}@keyframes scan{from{transform:translateY(-88px)}to{transform:translateY(88px)}}.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.quick .btn{box-shadow:none}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);z-index:50;background:#12203b;color:white;padding:11px 14px;border-radius:999px;font-size:13px;box-shadow:0 12px 28px rgba(0,0,0,.18)}
  </style>
</head>
<body>
<div id="app" class="app">
  <section id="lock" class="lock hidden"><div><div class="logo">盾</div><h1>动态验证器</h1><p id="pinHint">请设置本地 PIN，用于加密保存验证码密钥</p><form id="pinForm" class="pinbox card"><input id="pin" type="password" inputmode="numeric" maxlength="20" placeholder="输入 6 位以上 PIN" autocomplete="current-password" /><input id="pin2" class="hidden" type="password" inputmode="numeric" maxlength="20" placeholder="再次输入 PIN" autocomplete="new-password" /><button class="btn" id="pinBtn">开始使用</button></form><p class="note">所有密钥仅保存在本机浏览器，并用 PIN 派生密钥加密。忘记 PIN 无法恢复。</p></div></section>
  <section id="main" class="hidden"><header class="header"><div class="logo">盾</div><div><h1>动态验证器</h1><p>安全动态验证码</p></div><div class="top-actions"><button id="scanBtn" class="btn small">扫码添加</button></div></header><label class="search"><span>⌕</span><input id="q" placeholder="搜索账户名称或邮箱" /></label><section id="home"><div id="list" class="account-list"></div><div id="empty" class="empty card hidden"><div class="empty-icon">＋</div><h2>还没有验证码账户</h2><p>扫描 2FA 二维码，或手动输入密钥。</p><br><button id="emptyScan" class="btn">扫码添加</button> <button id="manualBtn" class="btn ghost">手动输入</button></div></section><section id="history" class="hidden"><h2 class="page-title">最近记录</h2><div id="histList" class="history"></div></section><section id="settings" class="hidden"><h2 class="page-title">设置</h2><div class="settings"><div class="setting card"><div><b>本地加密保存</b><p>账户密钥不上传服务器。</p></div><span class="status">已开启</span></div><div class="setting card"><div><b>添加到桌面</b><p>iPhone 用 Safari 打开，分享 → 添加到主屏幕。</p></div></div><button id="lockBtn" class="btn ghost">立即锁定</button><button id="clearBtn" class="btn danger">清空本机数据</button></div></section></section>
</div>
<nav class="tabs hidden" id="tabs"><button class="tab active" data-tab="home">首页</button><button class="tab" data-action="scan">扫码</button><button class="tab" data-tab="history">记录</button><button class="tab" data-tab="settings">设置</button></nav>
<div id="modalRoot"></div><div id="toast" class="toast hidden"></div>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
const $=s=>document.querySelector(s);const enc=new TextEncoder(),dec=new TextDecoder();let state={accounts:[],history:[]},key=null,timer=null,videoStream=null,scanTimer=null;const store={salt:'da_salt_v1',vault:'da_vault_v1'};const qrCanvas=document.createElement('canvas'),qrCtx=qrCanvas.getContext('2d',{willReadFrequently:true});
function toast(t){$('#toast').textContent=t;$('#toast').classList.remove('hidden');setTimeout(()=>$('#toast').classList.add('hidden'),2200)}
function b64(b){return btoa(String.fromCharCode(...new Uint8Array(b)))}function ub64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function derive(pin,salt){const base=await crypto.subtle.importKey('raw',enc.encode(pin),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:180000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}
async function save(){if(!key)return;const iv=crypto.getRandomValues(new Uint8Array(12));const data=enc.encode(JSON.stringify(state));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,data);localStorage.setItem(store.vault,JSON.stringify({iv:b64(iv),ct:b64(ct)}))}
async function load(pin){let salt=localStorage.getItem(store.salt);if(!salt){salt=b64(crypto.getRandomValues(new Uint8Array(16)));localStorage.setItem(store.salt,salt);key=await derive(pin,ub64(salt));state={accounts:[],history:[]};await save();return true}key=await derive(pin,ub64(salt));const raw=localStorage.getItem(store.vault);if(!raw)return true;try{const v=JSON.parse(raw);const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:ub64(v.iv)},key,ub64(v.ct));state=JSON.parse(dec.decode(plain));return true}catch(e){return false}}
function base32(s){const abc='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';let bits='',out=[];s=s.replace(/=|\s|-/g,'').toUpperCase();for(const ch of s){const n=abc.indexOf(ch);if(n<0)throw Error('密钥格式错误');bits+=n.toString(2).padStart(5,'0')}for(let i=0;i+8<=bits.length;i+=8)out.push(parseInt(bits.slice(i,i+8),2));return new Uint8Array(out)}
async function totp(secret,period=30,digits=6){const counter=Math.floor(Date.now()/1000/period);const msg=new ArrayBuffer(8),dv=new DataView(msg);dv.setUint32(4,counter);const k=await crypto.subtle.importKey('raw',base32(secret),{name:'HMAC',hash:'SHA-1'},false,['sign']);const h=new Uint8Array(await crypto.subtle.sign('HMAC',k,msg));const o=h[h.length-1]&15;const bin=((h[o]&127)<<24)|(h[o+1]<<16)|(h[o+2]<<8)|h[o+3];return String(bin%10**digits).padStart(digits,'0')}
function parseOtp(uri){const u=new URL(uri);if(u.protocol!=='otpauth:')throw Error('不是动态验证码二维码');const label=decodeURIComponent(u.pathname.replace(/^\//,''));const p=u.searchParams;const issuer=p.get('issuer')||label.split(':')[0]||'账户';const account=(label.includes(':')?label.split(':').slice(1).join(':'):label)||issuer;const secret=p.get('secret');if(!secret)throw Error('二维码里没有 secret');return{id:crypto.randomUUID(),issuer,account,secret,period:Number(p.get('period')||30),digits:Number(p.get('digits')||6),createdAt:Date.now()}}
function log(t){state.history.unshift({t,at:new Date().toLocaleString()});state.history=state.history.slice(0,30);save();renderHist()}
async function render(){const q=$('#q').value.trim().toLowerCase();const arr=state.accounts.filter(a=>(a.issuer+a.account).toLowerCase().includes(q));$('#empty').classList.toggle('hidden',state.accounts.length>0);$('#list').innerHTML='';for(const a of arr){let code='------';try{code=await totp(a.secret,a.period,a.digits)}catch(e){code='错误'}const remain=a.period-Math.floor(Date.now()/1000)%a.period;const pct=Math.round(remain/a.period*100)+'%';const el=document.createElement('article');el.className='account card';el.innerHTML=`<div class="account-head"><div class="svc">${(a.issuer||'?').slice(0,1).toUpperCase()}</div><div class="meta"><b>${a.issuer}</b><span>${a.account}</span></div></div><div class="code-row"><div class="code">${code.replace(/(\d{3})(\d+)/,'$1 $2')}</div><button class="copy">复制</button><div class="ring" style="--p:${pct}"><span>${remain}s</span></div></div>`;el.querySelector('.copy').onclick=()=>{navigator.clipboard?.writeText(code);toast('验证码已复制');log(`${a.issuer} 验证码已复制`)};$('#list').appendChild(el)}}
function renderHist(){const h=$('#histList');h.innerHTML='';if(!state.history.length){h.innerHTML='<div class="card history-item"><span>暂无记录</span></div>';return}for(const x of state.history){const d=document.createElement('div');d.className='card history-item';d.innerHTML=`<span>${x.t}</span><small>${x.at}</small>`;h.appendChild(d)}}
function switchTab(t){['home','history','settings'].forEach(id=>$('#'+id).classList.toggle('hidden',id!==t));document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t))}
function showMain(){ $('#lock').classList.add('hidden');$('#main').classList.remove('hidden');$('#tabs').classList.remove('hidden');render();renderHist();clearInterval(timer);timer=setInterval(render,1000)}function showLock(){ $('#lock').classList.remove('hidden');$('#main').classList.add('hidden');$('#tabs').classList.add('hidden');clearInterval(timer)}
async function addAccount(a){if(state.accounts.some(x=>x.secret===a.secret&&x.account===a.account)){toast('该账户已存在');return}state.accounts.push(a);await save();render();log(`${a.issuer} 账户已添加`);closeModal();toast('添加成功')}
function manualModal(){modal(`<div class="modal-head"><h2>手动输入密钥</h2><button class="x" onclick="closeModal()">×</button></div><input id="mIssuer" placeholder="服务名称，如 Google"/><input id="mAccount" placeholder="账户，如 user@gmail.com"/><input id="mSecret" placeholder="密钥 Secret"/><button class="btn" id="mSave">保存并开始验证</button>`);$('#mSave').onclick=()=>{const secret=$('#mSecret').value.trim();if(!secret)return toast('请输入密钥');addAccount({id:crypto.randomUUID(),issuer:$('#mIssuer').value.trim()||'账户',account:$('#mAccount').value.trim()||'未命名',secret,period:30,digits:6,createdAt:Date.now()})}}
function modal(html){$('#modalRoot').innerHTML=`<div class="modal-bg"><div class="modal card">${html}</div></div>`}function closeModal(){stopCam();$('#modalRoot').innerHTML=''}window.closeModal=closeModal;
function hasQrLib(){return typeof window.jsQR==='function'}
function scanCanvas(source,w,h){if(!hasQrLib())throw Error('二维码识别库加载失败，请检查网络后刷新');if(!w||!h)return null;const max=900;let dw=w,dh=h;if(Math.max(w,h)>max){const r=max/Math.max(w,h);dw=Math.round(w*r);dh=Math.round(h*r)}qrCanvas.width=dw;qrCanvas.height=dh;qrCtx.drawImage(source,0,0,dw,dh);const img=qrCtx.getImageData(0,0,dw,dh);return jsQR(img.data,dw,dh,{inversionAttempts:'attemptBoth'})}
async function handleQrValue(val){try{if(!val)return toast('未识别到二维码');if(!val.startsWith('otpauth://'))return toast('二维码不是动态验证码格式');await addAccount(parseOtp(val))}catch(e){toast(e.message||'识别失败')}}
async function scanModal(){modal(`<div class="modal-head"><h2>扫码添加</h2><button class="x" onclick="closeModal()">×</button></div><div class="scanbox"><video id="video" autoplay muted playsinline></video><div class="frame"></div><p id="scanHint" class="scan-hint">请允许摄像头权限，并将二维码放入框内</p></div><div class="quick"><button id="album" class="btn ghost">从相册导入</button><button id="manual2" class="btn ghost">手动输入密钥</button></div><input id="file" class="hidden" type="file" accept="image/*"/>`);$('#manual2').onclick=manualModal;$('#album').onclick=()=>$('#file').click();$('#file').onchange=e=>scanFile(e.target.files[0]);startCam()}
async function startCam(){if(!navigator.mediaDevices?.getUserMedia)return toast('当前浏览器不支持摄像头，请用 Safari/Chrome 并开启 HTTPS');try{const v=$('#video');videoStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});v.srcObject=videoStream;await v.play();$('#scanHint').textContent='正在识别二维码…';scanTimer=setInterval(()=>{try{if(!videoStream||!$('#video')||v.readyState<2)return;const code=scanCanvas(v,v.videoWidth,v.videoHeight);if(code?.data){handleQrValue(code.data)}}catch(e){$('#scanHint').textContent=e.message}},350)}catch(e){toast('无法打开摄像头，请在浏览器设置里允许摄像头权限')}}
function stopCam(){clearInterval(scanTimer);scanTimer=null;if(videoStream){videoStream.getTracks().forEach(t=>t.stop());videoStream=null}}
async function scanFile(file){if(!file)return;const img=new Image();img.onload=()=>{try{const code=scanCanvas(img,img.naturalWidth,img.naturalHeight);handleQrValue(code?.data)}catch(e){toast(e.message||'图片识别失败')}};img.onerror=()=>toast('图片读取失败');img.src=URL.createObjectURL(file)}
$('#pinForm').onsubmit=async e=>{e.preventDefault();const p=$('#pin').value;if(p.length<6)return toast('PIN 至少 6 位');const first=!localStorage.getItem(store.salt);if(first){if($('#pin2').classList.contains('hidden')){$('#pin2').classList.remove('hidden');$('#pinBtn').textContent='确认并进入';return}if(p!==$('#pin2').value)return toast('两次 PIN 不一致')}const ok=await load(p);if(!ok)return toast('PIN 错误或数据损坏');showMain()};
$('#scanBtn').onclick=scanModal;$('#emptyScan').onclick=scanModal;$('#manualBtn').onclick=manualModal;$('#q').oninput=render;$('#lockBtn').onclick=()=>{key=null;showLock()};$('#clearBtn').onclick=()=>{if(confirm('确定清空本机所有验证码数据？')){localStorage.removeItem(store.salt);localStorage.removeItem(store.vault);location.reload()}};document.querySelectorAll('.tab').forEach(b=>{b.onclick=()=>b.dataset.action==='scan'?scanModal():switchTab(b.dataset.tab)});
if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'}).catch(()=>{})}showLock();
</script>
</body>
</html>
